[build]
  command = "npm run build"
  publish = "dist"

# ── Cache headers ─────────────────────────────────────────────────────────────
# index.html must never be cached so browsers always fetch the latest entry
# point and pick up the newest hashed JS/CSS bundles on every deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed bundles — filenames change on every build so immutable is safe.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Public images are not fingerprinted by Vite — cap at 24 h so updates
# propagate within a day without hammering the CDN on every request.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
