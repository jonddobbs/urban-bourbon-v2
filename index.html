<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Urban Bourbon — Welsh Craft Coffee Brand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Netlify Forms detection — not visible to users -->
    <form name="subscription-waitlist" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="subscription-waitlist" />
      <input type="email" name="email" />
      <input type="text" name="blend" />
      <input type="text" name="size" />
      <input type="text" name="format" />
      <input type="text" name="frequency" />
    </form>
    <form name="reviews" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="reviews" />
      <input type="text" name="name" />
      <input type="text" name="location" />
      <input type="text" name="rating" />
      <textarea name="review"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
